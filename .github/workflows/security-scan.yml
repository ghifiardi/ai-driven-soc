name: Proactive Security Scan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install orchestrator
        run: |
          pip install --upgrade pip
          pip install "git+https://github.com/ghifiardi/proactive-security-orchestrator@main"
          python -c "import proactive_security_orchestrator as p; print('proactive-security-orchestrator v' + p.__version__)"

      - name: Install Semgrep + Gitleaks
        run: |
          pip install "semgrep==1.143.1"
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.0_linux_x64.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version
          semgrep --version

      - name: Determine orchestrator config path
        run: |
          echo "CONFIG_PATH=${GITHUB_WORKSPACE}/config" >> $GITHUB_ENV
          echo "Using CONFIG_PATH=${GITHUB_WORKSPACE}/config"

      - name: Run security scan
        continue-on-error: true
        run: |
          security-scan scan . \
            --format sarif \
            --output findings.sarif \
            --config "$CONFIG_PATH" \
            --no-fail-on-critical
          echo "Scan completed. SARIF exists?"
          ls -lah findings.sarif || echo "SARIF NOT FOUND"
      
      - name: Generate PDF report
        continue-on-error: true
        run: |
          security-scan scan . \
            --format pdf \
            --output security-report.pdf \
            --config "$CONFIG_PATH" \
            --no-fail-on-critical
          echo "PDF report generated:"
          ls -lah security-report.pdf || echo "PDF NOT FOUND"

      - name: Remediate findings
        continue-on-error: true
        run: |
          echo "Checking for remediation functionality..."
          if security-scan --help 2>&1 | grep -q "remediate"; then
            echo "Remediation command found. Attempting to remediate security findings..."
            security-scan remediate . \
              --findings findings.sarif \
              --config "$CONFIG_PATH" \
              --create-pr || echo "No auto-fixable findings or remediation failed"
          else
            echo "Remediation command not available in current version. Skipping remediation step."
            echo "To enable remediation, update the orchestrator to a version that includes remediation functionality."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: findings.sarif

      - name: Upload findings as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-findings
          path: |
            findings.sarif
            security-report.pdf
