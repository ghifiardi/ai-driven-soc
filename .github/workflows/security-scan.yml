name: Security Scan

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Run Security Scanner
    uses: ghifiardi/proactive-security-orchestrator/.github/workflows/security-scan.yml@f93a1120a91641ee92982411114abaa35d905a7f
    with:
      working-directory: "."
    secrets: inherit

